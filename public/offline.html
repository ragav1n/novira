<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Novira - Offline</title>
    <style>
      :root {
        --background: #0c081e;
        --foreground: #ffffff;
        --primary: #06b6d4; /* cyan-500 */
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--background);
        color: var(--foreground);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        overflow: hidden;
      }
      .container {
        padding: 2rem;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        z-index: 10;
      }
      .illustration {
        width: 240px;
        height: 240px;
        border-radius: 2rem;
        object-fit: contain;
        box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(
          to right,
          #ffffff,
          rgba(255, 255, 255, 0.7)
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.6);
        margin: 0;
        line-height: 1.5;
      }
      .retry-button {
        margin-top: 1rem;
        background-color: var(--primary);
        color: #ffffff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 1rem;
        font-size: 0.875rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 14px 0 rgba(6, 182, 212, 0.39);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .retry-button:active {
        transform: scale(0.95);
      }
      /* Background decorative blobs */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
      }
      .blob-1 {
        top: -10%;
        left: -10%;
        width: 300px;
        height: 300px;
        background-color: rgba(6, 182, 212, 0.15);
      }
      .blob-2 {
        bottom: -10%;
        right: -10%;
        width: 250px;
        height: 250px;
        background-color: rgba(168, 85, 247, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
      <img
        src="/offline-illustration.png"
        alt="Offline Connection"
        class="illustration"
      />

      <div>
        <h1>You're Offline</h1>
        <p>
          We couldn't connect to the server. Please check your internet
          connection to access your dashboard and transactions.
        </p>
      </div>

      <button class="retry-button" onclick="window.location.reload()">
        Try Again
      </button>
    </div>

    <script>
      // Check if back online
      window.addEventListener("online", function () {
        window.location.assign("/");
      });
    </script>
  </body>
</html>
